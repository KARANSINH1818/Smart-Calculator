<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Calculator</title>

<style>
body{
  font-family:Arial;
  background:#141e30;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.calculator{
  background:#1f2a38;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  width:320px;
}

.display{
  width:100%;
  height:60px;
  font-size:26px;
  margin-bottom:10px;
  text-align:right;
  border:none;
  border-radius:10px;
  padding:10px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

button{
  height:55px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#2e3b4e;
  color:white;
}

button:hover{ background:#3d4f68; }

.equal{ background:#ff9500; }

.history{
  margin-top:10px;
  height:120px;
  overflow-y:auto;
  background:#0f1722;
  padding:8px;
  border-radius:10px;
  font-size:14px;
  color:white;
}

.clearHistory{
  width:100%;
  margin-top:5px;
  background:red;
}
</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" class="display" readonly>

<div class="buttons">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">−</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calculate()" class="equal">=</button>
<button onclick="press('+')">+</button>

<button onclick="clearDisplay()" style="grid-column:span 4;background:red">
Clear
</button>
</div>

<!-- HISTORY BOX -->
<div class="history" id="calcHistory"></div>

<!-- CLEAR HISTORY BUTTON -->
<button class="clearHistory" onclick="clearHistory()">
Clear History
</button>

</div>

<script>
const display = document.getElementById("display");
const historyBox = document.getElementById("calcHistory");

function press(value){
  display.value += value;
}

function calculate(){
  try{
    let expression = display.value;
    let result = eval(expression);

    historyBox.innerHTML += expression + " = " + result + "<br>";

    display.value = result;
  }
  catch{
    alert("Invalid Expression");
  }
}

function clearDisplay(){
  display.value = "";
}

/* CLEAR HISTORY BUTTON */
function clearHistory(){
  historyBox.innerHTML = "";
}

/* KEYBOARD SUPPORT */
document.addEventListener("keydown", function(e){
  if("0123456789+-*/.".includes(e.key)){
    press(e.key);
  }
  if(e.key === "Enter"){
    calculate();
  }
  if(e.key === "Backspace"){
    display.value = display.value.slice(0,-1);
  }
});
</script>

</body>
</html>
